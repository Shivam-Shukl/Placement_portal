<!DOCTYPE html>
<html>
<head><title>Company Dashboard</title></head>
<body style="padding: 20px; background-color: #F3F4F4;">
    <div style="display: flex; justify-content: space-between; background-color: #612D53; color: white; padding: 10px;">
        <h2>Welcome Organization: {{ username }}</h2>
        <button style="width: 60px; height: 30px;">
            <a style="color: black; text-decoration: none;" href="/logout">Logout</a>
        </button>
    </div>
    <hr>

    <h3>Upcoming Drives</h3>
    <div style="text-align: right;">
        <a href="/create_drive"><button style="color: green; cursor: pointer;">+ Create Drive</button></a>
    </div>
    <table border="1" cellpadding="5" width="100%" style="margin-top: 10px; background-color: white; border-collapse: collapse;">
        <tr style="background-color: #e9ecef;">
            <th>Sr No.</th>
            <th>Drive Name</th>
            <th>Actions</th>
        </tr>
        {% for drive in upcoming %}
        <tr>
            <td style="text-align: center;">{{ drive.id }}</td>
            <td>{{ drive.drive_name }}</td>
            <td style="text-align: center;">
                <a href="/drive_details/{{ drive.id }}">
                    <button style="color: blue; cursor: pointer;">View Details</button>
                </a>
                <a href="{{ url_for('complete_drive', id=drive.id) }}">
                    <button style="color: green; cursor: pointer;">Mark as Complete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <h3>Closed Drives</h3>
    <table border="1" cellpadding="5" width="100%" style="background-color: white; border-collapse: collapse;">
        <tr style="background-color: #e9ecef;">
            <th>Sr No.</th>
            <th>Drive Name</th>
            <th>Actions</th>
        </tr>
        {% for drive in closed %}
        <tr>
            <td style="text-align: center;">{{ drive.id }}</td>
            <td>{{ drive.drive_name }}</td>
            <td style="text-align: center;">
                <a href="/drive_details/{{ drive.id }}">
                    <button style="color: blue; cursor: pointer;">Update Applications</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
