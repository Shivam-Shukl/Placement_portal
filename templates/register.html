<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:8px;
    text-align:center;
}


input, select, textarea, button{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}


button{
    background:#4CAF50;
    color:white;
    border:none;
    font-size:16px;
}

button:hover{
    background:#3e8e41;
}

</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>


<select name="role" id="role" onchange="toggleFields()" required>
<option value="">Select Role</option>
<option value="Student">Student</option>
<option value="Company">Company</option>
</select>


<div id="studentField">

<select name="department">
<option value="">Select Department</option>
<option>Computer Science</option>
<option>Data Science</option>
<option>BCA / MCA</option>
<option>BBA / MBA</option>
<option>Other</option>
</select>

</div>


<div id="companyField" style="display:none;">

<textarea name="overview" placeholder="Company Overview (only for companies)"></textarea>

</div>


<button type="submit">Register</button>

</form>

<br>

<a href="/login"><button style = "background: hsl(24, 82%, 42%)" >Login</button></a>

</div>


<script>

function toggleFields(){

var role=document.getElementById("role").value;

if(role==="Company"){
    document.getElementById("companyField").style.display="block";
    document.getElementById("studentField").style.display="none";
}

else if(role==="Student"){
    document.getElementById("companyField").style.display="none";
    document.getElementById("studentField").style.display="block";
}

}

</script>

</body>
</html>
