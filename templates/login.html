<!DOCTYPE html>
<html>

<head>
<title>Login - Placement Portal</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* Login box */
.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
    width:350px;
}

/* Title */
h2{
    margin-bottom:25px;
}

/* Inputs */
input, select{
    width:100%;
    height:45px;
    padding:10px;
    margin:10px 0;
    font-size:14px;
    box-sizing:border-box;
}

/* Button */
button{
    width:100%;
    height:45px;
    background:#4CAF50;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    border-radius:5px;
}

button:hover{
    background:#3e8e41;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role" required>
<option value="" disabled selected>Select Role</option>
<option value="Student">Student</option>
<option value="Company">Company</option>
<option value="Admin">Admin</option>
</select>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
