<!DOCTYPE html>
<html>
<head>
<title>Placement Portal</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
}

/* Background */
.bg{
    background:url("/static/image.jpg") center/cover no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Glass card */
.overlay{
    background:rgba(255,255,255,0.75);
    padding:60px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* Title */
h1{
    font-size:60px;
    margin-bottom:10px;
    letter-spacing:2px;
}

/* Subtitle */
p{
    font-size:20px;
    margin-bottom:30px;
    color:#333;
}

/* Common button style */
a{
    text-decoration:none;
    color:white;
    padding:12px 28px;
    margin:10px;
    border-radius:8px;
    font-weight:bold;
    display:inline-block;
}

</style>

</head>

<body>

<div class="bg">

<div class="overlay">

<h1>Placement Portal</h1>

<p>Connecting Students with Companies</p>

<a href="/login" style="background:#2196F3;">Login</a>
<a href="/register" style="background:hsl(347,77%,36%);">Register</a>

</div>

</div>

</body>
</html>
